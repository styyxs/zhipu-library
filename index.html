<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Ollie和Mimi一起学英语</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="home-bg"></div>

  <!-- 首页 -->
  <div id="homePage" class="page active">
    <div class="home-header">
      <div class="home-title">Ollie和Mimi</div>
      <div class="home-subtitle">一起学英语</div>
    </div>
    <div class="scene-grid">
      <div class="scene-card" onclick="App.selectScene('orchard')">
        <div class="scene-icon">🍎</div>
        <div class="scene-name">果园探险</div>
        <div class="scene-progress" id="orchardProgress">0/10</div>
      </div>
      <div class="scene-card" onclick="App.selectScene('farm')">
        <div class="scene-icon">🐔</div>
        <div class="scene-name">农场探险</div>
        <div class="scene-progress" id="farmProgress">0/10</div>
      </div>
      <div class="scene-card" onclick="App.selectScene('forest')">
        <div class="scene-icon">🌲</div>
        <div class="scene-name">森林探险</div>
        <div class="scene-progress" id="forestProgress">0/10</div>
      </div>
    </div>
    <div style="flex:1"></div>
  </div>

  <!-- Step1: Mimi呈现单词 -->
  <div id="step1Page" class="page step-page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
    </div>
    <div class="mimi-container">
      <div class="mimi-character">🐱</div>
      <div id="step1Dialogue" class="mimi-dialogue">Ollie，我今天学了一个新单词！</div>
    </div>
    <div class="word-display">
      <div id="wordLetters" class="word-letters"></div>
      <div id="wordImage" class="word-emoji">🍎</div>
      <div id="wordSpelling" class="word-spelling"></div>
    </div>
  </div>

  <!-- Step2: Ollie跟读 -->
  <div id="step2Page" class="page step-page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div class="step-indicator">
        <div class="step-dot"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
    </div>
    <div class="mimi-container">
      <div class="mimi-character">🐱</div>
      <div id="step2Dialogue" class="mimi-dialogue">你跟我念一遍好吗？按住按钮说话哦~</div>
    </div>
    <div class="record-btn-container">
      <button id="recordBtn" class="record-btn">🎤</button>
      <div class="record-hint">按住说话</div>
      <div id="volumeIndicator" class="volume-indicator"></div>
    </div>
  </div>

  <!-- Step3: 评分 -->
  <div id="step3Page" class="page step-page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div class="step-indicator">
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
    </div>
    <div id="step3Content" class="mimi-container" style="margin-top:100px;">
    </div>
  </div>

  <!-- Step4: Ollie教Mimi -->
  <div id="step4Page" class="page step-page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div class="step-indicator">
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>
    </div>
    <div class="mimi-container">
      <div class="mimi-character">🐱</div>
      <div id="step4Dialogue" class="mimi-dialogue">Ollie，这个用中文怎么说呀？</div>
    </div>
    <div class="record-btn-container">
      <button id="step4RecordBtn" class="record-btn">🎤</button>
      <div class="record-hint">按住告诉Mimi答案</div>
    </div>
  </div>

  <!-- Step5: 画画 -->
  <div id="step5Page" class="page step-page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div class="step-indicator">
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
        <div class="step-dot active"></div>
      </div>
    </div>
    <div class="tool-btns">
      <button class="tool-btn active" onclick="Canvas.erase()">橡皮</button>
      <button class="tool-btn" onclick="clearCanvas()">清空</button>
    </div>
    <div class="canvas-container">
      <canvas id="drawCanvas" width="350" height="350"></canvas>
    </div>
    <div id="colorPalette" class="color-palette"></div>
    <div class="canvas-actions">
      <button class="action-btn" onclick="replayWord()">🔊 再听一遍</button>
      <button class="action-btn primary" onclick="finishDrawing()">完成画画 ✓</button>
    </div>
  </div>

  <!-- 探险日记 -->
  <div id="diaryPage" class="page">
    <div class="step-header">
      <button class="back-btn" onclick="App.goBack()">←</button>
      <div style="font-size:20px;font-weight:bold;">探险日记</div>
      <div style="width:44px"></div>
    </div>
    <div id="diaryGrid" class="diary-grid"></div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="App.goHome()">
      <span class="nav-btn-icon">🏠</span>
      <span>首页</span>
    </button>
    <button class="nav-btn" onclick="App.openDiary()">
      <span class="nav-btn-icon">📔</span>
      <span>日记</span>
    </button>
  </div>

  <script src="js/canvas.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/words.js"></script>
  <script src="js/dialog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
